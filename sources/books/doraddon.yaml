  description: "Doraddon, a reményvesztett világ. Egy sötét fantasy setting, ahol hét ősmágus teremtett életet egy halott bolygón, de a civilizációt most a Pusztulat fenyegeti. A városok mágikus védernyők alatt küzdenek a túlélésért, miközben a Rend vasfegyelmmel tartja fenn a rendet."
