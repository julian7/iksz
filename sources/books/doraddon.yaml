# Notes for conversion
notes: |
  Original publication: March 2002
  Authors: Érfalvy Áron (E.y.A), Nagy Balázs (Julian)

  This world supplement contains:
  - Map of Doraddon (world map image)
  - Complete history from creation to present (1542 years)
  - Detailed city descriptions (7 major cities + destroyed cities)
  - Magic system (wizards and shamans)
  - Orders and factions (The Order, Masters of Hope, etc.)
  - Peoples and cultures (Brehk, Draggit, Mountain folk, Nomads)

  Setting features:
  - Dark fantasy atmosphere
  - Created by Seven Ancients (Ősmágusok)
  - Magic-woven world without gods
  - The Desolation (Pusztulat) consuming the world
  - Cities under magical protective domes
  - Strict martial law under The Order (Rend)
  - Desperate survival against apocalyptic forces
  - Limited resources and overpopulation
  - Loss of ancient knowledge

  Historical periods:
  - Age of the Ancients (0-511): Golden age under Seven Mages
  - Age of Fear (512-923): Ancients vanish, Desolation begins
  - Age of Chaos (924-1208): Cities fall, massive death toll
  - Age of Order (1209-present): The Order takes control

  Major cities:
  - Dun'Bar (The Most Protected City): 15 million, largest fortress
  - Morgador (Stone Heap): 2 million, isolated but holding
  - Liramo: ~3.75 million
  - Verlina: ~1.87 million
  - Aldahir (vanished 1480)
  - Dorarir (destroyed, partially rebuilt)
  - Dunbar (destroyed)
  - Plus destroyed cities: Merramon, Woladdon, Bhren'dor, Merano

  Key factions:
  - The Order (Megtisztítók Rendje): Brutal but necessary control
  - Masters of Hope (Remény Mesterei): Resistance against Order
  - Depositories of Hope: Searching for gods/salvation
  - Demon cults: Dark pacts with outer planes

  Peoples:
  - Brehk: Stone-natured, hardy survivors
  - Draggit: Dragon-descended, fewer than 100 remain
  - Mountain Folk (Hegyi Népek): Nomadic, resistant
  - Nomads: Desert wanderers

  Magic system:
  - Chaotic Doraddon energy field (unstable, dangerous)
  - Demonic plane energy (controlled but perilous)
  - Wizards vs. Shamans distinction
  - Most ancient knowledge lost
  - Protective domes require massive magical power

  Special features:
  - No active gods (abandoned/lost concept)
  - Population: ~10-15 million (down from 650 million)
  - Weekly harvest cycles (magically enhanced)
  - Water contamination requiring magical purification
  - Constant monster invasions through protective domes
  - Portal magic nearly impossible through Desolation
  - Resource scarcity (ore mines depleted)

  Themes:
  - Hope vs. despair
  - Order vs. freedom
  - Survival at any cost
  - Lost knowledge and civilization decline
  - Humanity without divine guidance
  - The price of safety

  Special conversion notes:
  - Map image included (doraddon.png)
  - Extensive quotations from historical figures
  - Detailed city descriptions with demographics
  - Complex timeline across four ages
  - Multiple factions and orders
  - Rich worldbuilding with peoples and cultures
