      - file: "terido/intro/authors.md"
        title: "Szerzők"
        title_en: "Authors"
        include_in_toc: true

      - file: "terido/intro/intro.md"
        title: "Bevezető"
        title_en: "Introduction"
        include_in_toc: true

  # Part 2: The Story
  - section: "A Világ"
    section_en: "The World"
