# IKSZ Téridő - Book Definition
# Sci-Fi world module

book:
  id: terido
  title: "IKSZ Téridő"
  title_en: "IKSZ Téridő"
  subtitle: ""
  subtitle_en: "Sci-Fi World"
  version: "1.0"
  language: hu
  author: "Priest (Varga József)"
  compiled_by: "Priest"
  description: "Egy IKSZ Sci-Fi világmodul, amely a 21. század elején játszódik. A tudósok sikeresen előállították az antianyagot, ami forradalmi technológia volt - olcsóbb és környezetbarátabb az atomenergiánál. De valami hiba csúszott az egyenletekbe, és a technológia kisiklott az ellenőrzés alól."
  module_type: "Világmodul"
  module_description: "Sci-Fi világ"
  copyright: "© IKSZ Projekt 1997-2000"

chapters:
